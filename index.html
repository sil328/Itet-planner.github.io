<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner ITET</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --bg2: #ede7d9;
    --card: #faf7f2;
    --ink: #2a2218;
    --ink2: #6b5c45;
    --ink3: #a8967e;
    --accent: #c85a2e;
    --accent2: #4a7c6f;
    --accent3: #7a5c9e;
    --border: #d4c8b5;
    --shadow: rgba(42,34,24,0.08);
    --line: 1px solid var(--border);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4b89a' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* HEADER */
  header {
    background: var(--card);
    border-bottom: var(--line);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .logo span { color: var(--accent); font-style: italic; }

  /* KEY BUTTON */
  #key-btn {
    background: none;
    border: var(--line);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--ink2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
  }
  #key-btn:hover { background: var(--bg2); border-color: var(--accent); color: var(--accent); }
  #key-btn.authed { color: var(--accent2); border-color: var(--accent2); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink3); display: inline-block; }
  #key-btn.authed .dot { background: var(--accent2); }

  /* MAIN */
  main { max-width: 960px; margin: 0 auto; padding: 2.5rem 1.5rem; }

  /* SECTION TITLES */
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem;
    font-weight: 400;
    color: var(--ink2);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* WEEK NAV */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    background: var(--card);
    border: var(--line);
    border-radius: 12px;
    padding: 12px 16px;
  }
  .week-label {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 300;
    font-style: italic;
    color: var(--ink);
    text-align: center;
    flex: 1;
  }
  .week-label strong { font-weight: 600; font-style: normal; }
  .nav-arrow {
    background: none;
    border: var(--line);
    border-radius: 8px;
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink2);
    font-size: 1rem;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .nav-arrow:hover { background: var(--bg2); color: var(--accent); border-color: var(--accent); }

  /* CALENDAR GRID */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 2.5rem;
  }
  .day-col {
    background: var(--card);
    border: var(--line);
    border-radius: 12px;
    min-height: 140px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .day-col:hover { box-shadow: 0 4px 16px var(--shadow); }
  .day-col.today { border-color: var(--accent); }
  .day-header {
    padding: 10px 10px 8px;
    border-bottom: var(--line);
    text-align: center;
  }
  .day-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink3);
  }
  .day-num {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.2;
  }
  .day-col.today .day-num { color: var(--accent); }
  .day-events { padding: 6px; display: flex; flex-direction: column; gap: 4px; }
  .event-chip {
    border-radius: 6px;
    padding: 5px 7px;
    font-size: 0.68rem;
    line-height: 1.35;
    border-left: 3px solid;
    cursor: default;
  }
  .event-chip .chip-name { font-weight: 500; color: var(--ink); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-chip .chip-mat { color: var(--ink2); font-family: 'DM Mono', monospace; font-size: 0.62rem; }
  .chip-0 { background: #fff0eb; border-color: var(--accent); }
  .chip-1 { background: #edf4f2; border-color: var(--accent2); }
  .chip-2 { background: #f3f0f8; border-color: var(--accent3); }
  .chip-3 { background: #fdf8ec; border-color: #c9963a; }
  .chip-more { font-size: 0.62rem; color: var(--ink3); font-family: 'DM Mono', monospace; padding: 2px 4px; }

  /* SEARCH */
  .search-section { margin-bottom: 2.5rem; }
  .search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .search-box input {
    flex: 1;
    background: var(--card);
    border: var(--line);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent2); }
  .search-box input::placeholder { color: var(--ink3); }
  .search-box button {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .search-box button:hover { opacity: 0.85; }

  .results-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .results-table th {
    background: var(--bg2);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink2);
    padding: 10px 14px;
    text-align: left;
    border-bottom: var(--line);
  }
  .results-table td {
    padding: 10px 14px;
    font-size: 0.875rem;
    border-bottom: var(--line);
    color: var(--ink);
  }
  .results-table tr:last-child td { border-bottom: none; }
  .results-table tr:hover td { background: var(--bg); }
  .materia-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    background: #edf4f2;
    color: var(--accent2);
    border: 1px solid #c0dbd6;
  }
  .note-text { color: var(--ink2); font-style: italic; font-size: 0.8rem; }

  /* PAGINATION */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 1rem;
  }
  .pagination span {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink2);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(42,34,24,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: var(--line);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 16px 48px rgba(42,34,24,0.18);
    animation: pop 0.2s ease;
  }
  @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 400;
    margin-bottom: 1.25rem;
    color: var(--ink);
  }
  .modal label {
    display: block;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    color: var(--ink2);
    margin-bottom: 5px;
    margin-top: 14px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal textarea {
    width: 100%;
    background: var(--bg);
    border: var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.875rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent2); }
  .modal textarea { resize: vertical; min-height: 72px; }
  .modal-btns {
    display: flex; gap: 10px; margin-top: 1.5rem;
  }
  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.875rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary {
    background: none;
    border: var(--line);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.875rem;
    color: var(--ink2);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: var(--bg2); }

  /* KEY MODAL */
  .key-modal { max-width: 340px; }
  #key-input {
    width: 100%;
    background: var(--bg);
    border: var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    color: var(--ink);
    outline: none;
    letter-spacing: 0.04em;
    transition: border-color 0.2s;
    margin-top: 8px;
  }
  #key-input:focus { border-color: var(--accent2); }
  #key-error { color: var(--accent); font-size: 0.78rem; margin-top: 6px; min-height: 18px; font-family: 'DM Mono', monospace; }

  /* ADD FORM (shown when authed) */
  #add-section {
    display: none;
    background: var(--card);
    border: var(--line);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 2.5rem;
  }
  #add-section.visible { display: block; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid .full { grid-column: 1 / -1; }
  .field label {
    display: block;
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--ink2);
    margin-bottom: 5px;
  }
  .field input, .field textarea {
    width: 100%;
    background: var(--bg);
    border: var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.875rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent2); }
  .field textarea { min-height: 64px; resize: vertical; }
  #add-form-title {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 1.25rem;
  }
  .toast {
    position: fixed;
    bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: var(--ink);
    color: #f5f0e8;
    padding: 10px 22px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-family: 'DM Mono', monospace;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 500;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .empty-state {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--ink3);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 0.9rem;
  }

  @media (max-width: 700px) {
    .calendar-grid { grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day-num { font-size: 1rem; }
    .day-name { font-size: 0.55rem; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Planner <span>ITET</span></div>
  <button id="key-btn" onclick="openKeyModal()">
    <span class="dot"></span>
    <span id="key-btn-label">accesso</span>
  </button>
</header>

<main>

  <div id="add-section">
    <div id="add-form-title">✦ Aggiungi interrogazione</div>
    <div class="form-grid">
      <div class="field full">
        <label>Nome e cognome (separati da virgola se più persone)</label>
        <input type="text" id="f-nome" placeholder="es. Mario Rossi, Anna Verdi">
      </div>
      <div class="field">
        <label>Data</label>
        <input type="date" id="f-data">
      </div>
      <div class="field">
        <label>Materia</label>
        <input type="text" id="f-materia" placeholder="es. Matematica">
      </div>
      <div class="field full">
        <label>Note (opzionale)</label>
        <textarea id="f-note" placeholder="Argomenti, capitoli..."></textarea>
      </div>
    </div>
    <div style="margin-top: 1rem;">
      <button class="btn-primary" onclick="submitInterrogazione()" style="width: auto; padding: 11px 28px;">Aggiungi al calendario</button>
    </div>
  </div>

  <div class="section-title">Calendario settimanale</div>

  <div class="week-nav">
    <button class="nav-arrow" onclick="changeWeek(-1)">&#8592;</button>
    <div class="week-label" id="week-label">caricamento...</div>
    <button class="nav-arrow" onclick="changeWeek(1)">&#8594;</button>
  </div>

  <div class="calendar-grid" id="calendar-grid">
    </div>

  <div class="search-section">
    <div class="section-title">Cerca studente</div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Nome e cognome..." onkeydown="if(event.key==='Enter') searchStudent()">
      <button onclick="searchStudent()">Cerca</button>
    </div>
    <div id="search-results"></div>
    <div class="pagination" id="pagination" style="display:none">
      <button class="nav-arrow" onclick="changePage(-1)">&#8592;</button>
      <span id="page-label"></span>
      <button class="nav-arrow" onclick="changePage(1)">&#8594;</button>
    </div>
  </div>

</main>

<div class="modal-overlay" id="key-modal">
  <div class="modal key-modal">
    <h2>🔑 Inserisci la chiave</h2>
    <input type="password" id="key-input" placeholder="chiave di accesso" onkeydown="if(event.key==='Enter') submitKey()">
    <div id="key-error"></div>
    <div class="modal-btns" style="margin-top: 1.25rem;">
      <button class="btn-primary" onclick="submitKey()">Accedi</button>
      <button class="btn-secondary" onclick="closeKeyModal()">Annulla</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// INDIRIZZO ASSOLUTO DEL TUO SERVER
const BASE_URL = "http://de3.bot-hosting.net:20368";

let weekOffset = 0;
let currentPage = 1;
let currentSearch = '';
let currentTotalPages = 1;
let authKey = '';
let isAuthed = false;

const DAYS_IT = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const MONTHS_IT = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
const CHIP_COLORS = 4;

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getDate()} ${MONTHS_IT[d.getMonth()]}`;
}

function formatWeekLabel(start, end) {
  const s = new Date(start + 'T00:00:00');
  const e = new Date(end + 'T00:00:00');
  const sameMonth = s.getMonth() === e.getMonth();
  const sameYear = s.getFullYear() === e.getFullYear();
  if (sameMonth) {
    return `Settimana dal <strong>${s.getDate()}</strong> al <strong>${e.getDate()} ${MONTHS_IT[e.getMonth()]} ${e.getFullYear()}</strong>`;
  } else if (sameYear) {
    return `Settimana dal <strong>${s.getDate()} ${MONTHS_IT[s.getMonth()]}</strong> al <strong>${e.getDate()} ${MONTHS_IT[e.getMonth()]} ${e.getFullYear()}</strong>`;
  }
  return `Settimana dal <strong>${s.getDate()} ${MONTHS_IT[s.getMonth()]} ${s.getFullYear()}</strong> al <strong>${e.getDate()} ${MONTHS_IT[e.getMonth()]} ${e.getFullYear()}</strong>`;
}

function getTodayRome() {
  return new Date().toLocaleDateString('it-IT', { timeZone: 'Europe/Rome', year: 'numeric', month: '2-digit', day: '2-digit' }).split('/').reverse().join('-');
}

async function loadCalendar() {
  try {
    const res = await fetch(`${BASE_URL}/api/interrogazioni?week_offset=${weekOffset}`);
    const json = await res.json();
    renderCalendar(json.data, json.week_start, json.week_end);
  } catch(e) {
    document.getElementById('week-label').innerHTML = 'Errore di caricamento';
  }
}

function renderCalendar(events, weekStart, weekEnd) {
  document.getElementById('week-label').innerHTML = formatWeekLabel(weekStart, weekEnd);
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';
  const today = getTodayRome();

  // Build 7 days
  for (let i = 0; i < 7; i++) {
    const date = new Date(weekStart + 'T00:00:00');
    date.setDate(date.getDate() + i);
    const dateStr = date.toISOString().split('T')[0];
    const isToday = dateStr === today;
    const dayEvents = events.filter(e => e.data === dateStr);

    const col = document.createElement('div');
    col.className = 'day-col' + (isToday ? ' today' : '');

    const shown = dayEvents.slice(0, 3);
    const extra = dayEvents.length - shown.length;
    const chipsHtml = shown.map((ev, idx) => `
      <div class="event-chip chip-${idx % CHIP_COLORS}" title="${ev.note || ''}">
        <span class="chip-name">${ev.nome}</span>
        <span class="chip-mat">${ev.materia}</span>
      </div>
    `).join('') + (extra > 0 ? `<div class="chip-more">+${extra} altri</div>` : '');

    col.innerHTML = `
      <div class="day-header">
        <div class="day-name">${DAYS_IT[i]}</div>
        <div class="day-num">${date.getDate()}</div>
      </div>
      <div class="day-events">${chipsHtml || ''}</div>
    `;
    grid.appendChild(col);
  }
}

function changeWeek(delta) {
  weekOffset += delta;
  loadCalendar();
}

async function searchStudent() {
  const nome = document.getElementById('search-input').value.trim();
  if (!nome) return;
  currentSearch = nome;
  currentPage = 1;
  await doSearch();
}

async function doSearch() {
  const res = await fetch(`${BASE_URL}/api/interrogazioni/studente?nome=${encodeURIComponent(currentSearch)}&page=${currentPage}`);
  const json = await res.json();
  const total = json.total || 0;
  currentTotalPages = Math.max(1, Math.ceil(total / json.per_page));

  const el = document.getElementById('search-results');
  if (!json.data || json.data.length === 0) {
    el.innerHTML = '<div class="empty-state">Nessuna interrogazione trovata.</div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  const rows = json.data.map(ev => `
    <tr>
      <td>${ev.nome}</td>
      <td>${formatDate(ev.data)}</td>
      <td><span class="materia-badge">${ev.materia}</span></td>
      <td>${ev.note ? `<span class="note-text">${ev.note}</span>` : '—'}</td>
    </tr>
  `).join('');

  el.innerHTML = `
    <table class="results-table">
      <thead><tr><th>Nome</th><th>Data</th><th>Materia</th><th>Note</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;

  const pag = document.getElementById('pagination');
  if (currentTotalPages > 1) {
    pag.style.display = 'flex';
    document.getElementById('page-label').textContent = `${currentPage} / ${currentTotalPages}`;
  } else {
    pag.style.display = 'none';
  }
}

function changePage(delta) {
  const newPage = currentPage + delta;
  if (newPage < 1 || newPage > currentTotalPages) return;
  currentPage = newPage;
  doSearch();
}

// KEY MODAL
function openKeyModal() {
  if (isAuthed) {
    // logout
    isAuthed = false;
    authKey = '';
    document.getElementById('key-btn').classList.remove('authed');
    document.getElementById('key-btn-label').textContent = 'accesso';
    document.getElementById('add-section').classList.remove('visible');
    showToast('Disconnesso.');
    return;
  }
  document.getElementById('key-modal').classList.add('open');
  document.getElementById('key-input').value = '';
  document.getElementById('key-error').textContent = '';
  setTimeout(() => document.getElementById('key-input').focus(), 100);
}

function closeKeyModal() {
  document.getElementById('key-modal').classList.remove('open');
}

async function submitKey() {
  const key = document.getElementById('key-input').value.trim();
  if (!key) return;
  try {
    const res = await fetch(`${BASE_URL}/api/verify-key`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key })
    });
    if (res.ok) {
      authKey = key;
      isAuthed = true;
      closeKeyModal();
      document.getElementById('key-btn').classList.add('authed');
      document.getElementById('key-btn-label').textContent = 'connesso';
      document.getElementById('add-section').classList.add('visible');
      showToast('Accesso effettuato!');
    } else {
      document.getElementById('key-error').textContent = 'Chiave non valida.';
      document.getElementById('key-input').focus();
    }
  } catch(e) {
    document.getElementById('key-error').textContent = 'Errore di rete.';
  }
}

async function submitInterrogazione() {
  const nome = document.getElementById('f-nome').value.trim();
  const data = document.getElementById('f-data').value;
  const materia = document.getElementById('f-materia').value.trim();
  const note = document.getElementById('f-note').value.trim();

  if (!nome || !data || !materia) {
    showToast('Compila nome, data e materia!');
    return;
  }

  try {
    const res = await fetch(`${BASE_URL}/api/interrogazioni`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Auth-Key': authKey },
      body: JSON.stringify({ nome, data, materia, note })
    });
    if (res.ok) {
      const json = await res.json();
      showToast(`Aggiunto! (${json.inserted} ${json.inserted === 1 ? 'studente' : 'studenti'})`);
      document.getElementById('f-nome').value = '';
      document.getElementById('f-data').value = '';
      document.getElementById('f-materia').value = '';
      document.getElementById('f-note').value = '';
      loadCalendar();
    } else {
      showToast('Errore durante il salvataggio.');
    }
  } catch(e) {
    showToast('Errore di rete.');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Close modal on overlay click
document.getElementById('key-modal').addEventListener('click', function(e) {
  if (e.target === this) closeKeyModal();
});

// Init
loadCalendar();
setInterval(loadCalendar, 60000);
</script>
